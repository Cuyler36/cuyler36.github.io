# SITE CONFIGURATION
baseurl: ""
url: "https://cuyler36.github.io"
title: Cuyler's blog
description: "Cuyler's blog"

# THEME CONFIGURATION (Type on Strap 2.x)
avatar: assets/img/C.png
favicon: assets/favicon.ico

header_text: >
  <p>Just some rambling about Animal Crossing <br> and reverse engineering.</p>
header_feature_image: assets/img/Banner.png
header_feature_image_responsive: false

footer_text: >
  Powered by <a href="https://jekyllrb.com/">Jekyll</a> with <a href="https://github.com/sylhare/Type-on-Strap">Type on Strap</a>

post_navigation: true
katex: false
color_theme: auto
excerpt: true

# PAGINATION (keep /page2/ URLs from the old site)
paginate: 5
paginate_path: "/page:num/"

# BUILD SETTINGS
theme: type-on-strap

sass:
  style: compressed
  quiet_deps: true

plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed

include:
  - assets/js/acdx/vendor/xdelta3-stream.wasm

exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - node_modules
  - vendor
  - .idea
  - .github
